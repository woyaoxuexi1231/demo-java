# ========== 服务器配置 ==========
server:
  port: 0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

# ========== Spring 配置 ==========
spring:
  application:
    name: spring
  main:
    allow-circular-references: true
  profiles:
    active: eureka

  # 开发工具
  devtools:
    restart:
      additional-paths: src/main/java
      enabled: true
    livereload:
      port: 35729
      enabled: true

  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 465
    username: 154347188@qq.com
    password: vfpphxwucozkbhdd
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false

  # 数据源
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/test?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4&rewriteBatchedStatements=true&allowMultiQueries=true&useCursorFetch=true
    username: root
    password: 123456

  # JPA
  jpa:
    database: mysql
    hibernate:
      ddl-auto: none
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis
  data:
    redis:
      host: host.docker.internal
      port: 6379
      password: 123456
      timeout: 5000
      database: 0

  # MongoDB
    mongodb:
      host: host.docker.internal
      port: 27017
      database: demo_db

  # Elasticsearch
  elasticsearch:
    uris: http://host.docker.internal:9200

  # RabbitMQ
  rabbitmq:
    addresses: host.docker.internal
    port: 5672
    username: admin
    password: admin
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

  # Kafka 配置
  kafka:
    bootstrap-servers: host.docker.internal:9092  # Kafka 服务器地址（Docker 网络）
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                    # 等待所有副本确认
      retries: 3                   # 重试次数
      batch-size: 16384            # 批处理大小
      linger-ms: 1                 # 延迟发送时间
      buffer-memory: 33554432      # 缓冲区内存大小
    consumer:
      group-id: kafka-demo-group   # 消费者组 ID
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest  # 消费起始位置
      enable-auto-commit: false    # 禁用自动提交
      max-poll-records: 100        # 每次拉取最大记录数
      properties:
        spring.json.trusted.packages: "*"  # 信任所有包的反序列化

# ========== RocketMQ 配置 (版本 2.3.5) ==========
rocketmq:
  name-server: host.docker.internal:9876  # NameServer 地址
  producer:
    group: demo-producer-group     # 生产者组名
    send-message-timeout: 3000     # 发送消息超时时间（毫秒）
    retry-times-when-send-failed: 2  # 发送失败重试次数
    compress-msg-body-over-howmuch: 4096  # 消息压缩阈值（字节）
    max-message-size: 4194304      # 最大消息大小（字节）
  consumer:
    group: demo-consumer-group     # 消费者组名
    consume-thread-min: 5          # 消费线程最小数量
    consume-thread-max: 20         # 消费线程最大数量
    consume-message-batch-max-size: 1  # 批量消费最大消息数量

# ========== Kafka 配置 ==========
# ========== MinIO 配置 ==========
minio:
  endpoint: http://host.docker.internal:9000  # MinIO 服务地址
  access-key: minio-access-key          # Access Key
  secret-key: minio-secret-key          # Secret Key
  bucket-name: test-bucket              # 默认存储桶名称
  download-dir: C:\dataz\Project\study-demo\demo-db\minio

##################################  ORM框架配置  ##################################

# ========== MyBatis 配置 ==========
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    local-cache-scope: statement    # 一级缓存范围：SESSION/STATEMENT
    cache-enabled: false           # 是否开启二级缓存
    lazy-loading-enabled: true     # 开启懒加载
    aggressive-lazy-loading: false # 关闭激进懒加载
  mapper-locations: classpath:mapper/*.xml

# ========== MyBatis-Plus 配置 ==========
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:mapper/*.xml

# ========== PageHelper 配置 ==========
pagehelper:
  auto-runtime-dialect: true  # 自动识别数据库 dialect
  page-size-zero: true        # pageSize=0 时查询全部数据

##################################  监控和指标配置  ##################################

# ========== 端点暴露配置 ==========
management:
  endpoints:
    web:
      exposure:
        include: '*'  # 暴露所有端点
  endpoint:
    shutdown:
      enabled: true   # 启用 shutdown 端点
    health:
      show-details: always  # 显示健康检查详情
    prometheus:
      enabled: true   # 启用 Prometheus 端点
  prometheus:
    metrics:
      export:
        enabled: true # 启用指标导出

##################################  日志配置  ##################################

logging:
  level:
    org.hulei: debug  # 设置项目包的日志级别为 DEBUG
    org.springframework.security: debug  # Spring Security 日志
    org.apache.rocketmq: info            # RocketMQ 日志级别

##################################  自定义配置  ##################################

# ========== 应用自定义配置 ==========
app:
  config:
    name: MyApp
    max-requests: 100

# ========== 欢迎信息配置 ==========
done:
  time:
    enable: true
greeting:
  welcome: You are using ${spring.application.name}

##################################  第三方服务配置  ##################################

# ========== SSH 配置（用于远程操作） ==========
jsch:
  ssh-host: host.docker.internal
  ssh-port: 22
  ssh-username: root
  ssh-password: 2Kryspr!
  upstream-config-path: /usr/local/nginx/conf/upstream
  nginx-bin-path: /usr/local/nginx/sbin
  nginx-config-path: /usr/local/nginx/conf

# ========== 对象存储配置 ==========
aliyun:
  oss:
    endpoint: xxxxxxx
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name

##################################  项目集成配置  ##################################

# ========== CJ 项目配置 ==========
common:
  security:
    default:
      websecurity: false  # 禁用默认 Web 安全配置

# ========== ID 生成器配置 ==========
curator:
  enable: true
  retry-count: 4
  elapsed-time-ms: 500
  session-timeout-ms: 60000
  connection-timeout-ms: 10000
  connect-string: host.docker.internal:2181

